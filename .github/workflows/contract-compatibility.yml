name: Contract Compatibility

on:
  pull_request:
    paths:
      - "contracts/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/contract-compatibility.yml"
  push:
    branches: ["main"]
    paths:
      - "contracts/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/contract-compatibility.yml"

permissions:
  contents: read

jobs:
  contract-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run format
      - run: npm run lint
      - run: npm run contracts:check
      - run: npm run test:fixtures
      - run: npm run test:compatibility
